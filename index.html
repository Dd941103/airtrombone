<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Instrument Studio (Ultimate Mobile Pro)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1a1a1a; 
            color: #eee; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
        }

        .app-container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            background: #2b2b2b; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 1024px;
            width: 100%;
            height: auto;
            max-height: 95vh;
            box-sizing: border-box;
        }

        .side-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 300px; 
            flex-shrink: 0; 
            justify-content: center;
        }

        h1 { 
            margin: 0; 
            font-size: 22px; 
            color: #ffbc2e; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.1s;
        }
        h1:active { transform: scale(0.95); }
        
        .select-box { display: flex; flex-direction: column; gap: 5px; }
        .select-box label { font-size: 11px; color: #aaa; font-weight: bold; }
        select {
            padding: 10px; font-size: 14px; background-color: #3a3a3a; color: #fff;
            border: 1px solid #555; border-radius: 6px; cursor: pointer; outline: none; font-weight: bold;
        }
        select:focus { border-color: #ffbc2e; }

        .range-container { display: flex; gap: 10px; }
        .range-container .select-box { flex: 1; }

        button { padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; background-color: #ffbc2e; border: none; border-radius: 6px; color: #111; transition: 0.2s; }
        button:hover { background-color: #e5a822; }
        button:disabled { background-color: #666; color: #aaa; cursor: not-allowed; }
        
        .test-btn { background-color: #3498db; color: #fff; padding: 8px; font-size: 13px; margin-top: -5px; }
        .test-btn:hover { background-color: #2980b9; }
        
        .metro-btn { background-color: #9b59b6; color: #fff; margin-top: -2px; padding: 10px; font-size: 14px; }
        .metro-btn.playing { background-color: #e74c3c; }

        .status-box { background: #1e1e1e; padding: 8px; border-radius: 6px; border: 1px solid #444; text-align: center; }
        #noteDisplay { font-size: 28px; font-weight: bold; color: #ffbc2e; margin-top: 3px; }
        #positionDisplay { font-size: 13px; color: #888; }

        #graph_canvas { background: #1e1e1e; border: 1px solid #444; border-radius: 6px; width: 100%; height: 120px; }
        
        .debug-panel { 
            background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px; height: 80px; 
            overflow-y: auto; font-family: monospace; font-size: 11px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1;
        }
        .debug-panel.hidden { height: 0; padding: 0; margin: 0; border: none; opacity: 0; pointer-events: none; }
        .log-info { color: #2ecc71; margin-bottom: 4px; }
        .log-warn { color: #f1c40f; margin-bottom: 4px; }
        .log-error { color: #e74c3c; margin-bottom: 4px; font-weight: bold; }

        #canvas-container { 
            position: relative; flex-grow: 1; width: 100%; max-width: 640px; 
            aspect-ratio: 4 / 3; border: 2px solid #111; border-radius: 8px; 
            overflow: hidden; background: #000; 
        }

        video, #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }

        .tongue-btn-container { position: absolute; bottom: 20px; right: 20px; z-index: 10; }
        .tongue-btn {
            width: 80px; height: 80px; border-radius: 50%; background: rgba(255, 188, 46, 0.85); border: 3px solid #fff;
            color: #111; font-size: 14px; font-weight: bold; display: flex; flex-direction: column; justify-content: center;
            align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; touch-action: manipulation;
        }
        .tongue-btn:active { transform: scale(0.9); background: rgba(229, 168, 34, 1); }

        @media (max-width: 850px) and (orientation: portrait) {
            body { align-items: flex-start; overflow-y: auto; }
            .app-container { flex-direction: column-reverse; padding: 12px; gap: 12px; max-height: none; }
            .side-panel { width: 100%; } #canvas-container { max-width: 100%; }
            .tongue-btn { width: 70px; height: 70px; font-size: 12px; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            body { padding: 5px; overflow: hidden; }
            .app-container { flex-direction: row; padding: 10px; gap: 15px; height: 96vh; border-radius: 8px; }
            .side-panel { width: 220px; gap: 5px; } h1 { font-size: 15px; } button { padding: 8px; font-size: 13px; }
            .status-box { padding: 4px; } #noteDisplay { font-size: 22px; } #graph_canvas { height: 60px; } 
            .debug-panel { height: 45px; font-size: 10px; } select { padding: 5px; font-size: 11px; }
            #canvas-container { max-height: 100%; aspect-ratio: 4 / 3; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="side-panel">
            <h1 id="appTitle">🎺 Air Studio</h1>
            
            <div class="select-box">
                <label for="instrumentSelect">選擇樂器</label>
                <select id="instrumentSelect">
                    <option value="trombone">長號 Trombone (左右連續拉管)</option>
                    <option value="guzheng">古箏 Guzheng (右撥弦 ✕ 左壓弦)</option>
                </select>
            </div>

            <div class="select-box">
                <label for="playModeSelect">演奏模式</label>
                <select id="playModeSelect">
                    <option value="quantize">🎯 開啟吸附 (精準卡音格)</option>
                    <option value="portamento">🎻 開啟滑音 / 左手壓音 (真實樂器動態)</option>
                </select>
            </div>

            <div class="range-container">
                <div class="select-box">
                    <label for="lowNoteSelect">最低音 (Low)</label>
                    <select id="lowNoteSelect"></select>
                </div>
                <div class="select-box">
                    <label for="highNoteSelect">最高音 (High)</label>
                    <select id="highNoteSelect"></select>
                </div>
            </div>

            <button id="startBtn">啟動系統 (Start)</button>
            <button id="testAudioBtn" class="test-btn" disabled>🔊 強制測試發聲</button>
            <button id="metroBtn" class="metro-btn" disabled>⏱️ 開啟經典節拍器</button>
            
            <div class="status-box">
                <div id="noteDisplay">--</div>
                <div id="positionDisplay">等待啟動...</div>
            </div>

            <canvas id="graph_canvas" width="320" height="150"></canvas>

            <div class="debug-panel" id="debugLog">
                <div class="log-info" style="color: #888;">[System] 專業級演奏核心已就緒。</div>
            </div>
        </div>

        <div id="canvas-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div class="tongue-btn-container">
                <div class="tongue-btn" id="tongueBtn">
                    <span>👅</span>
                    <span>點舌/撥弦</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const graphCanvas = document.getElementById('graph_canvas');
        const graphCtx = graphCanvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const testAudioBtn = document.getElementById('testAudioBtn');
        const metroBtn = document.getElementById('metroBtn');
        const noteDisplay = document.getElementById('noteDisplay');
        const positionDisplay = document.getElementById('positionDisplay');
        const debugLog = document.getElementById('debugLog');
        const instrumentSelect = document.getElementById('instrumentSelect');
        const playModeSelect = document.getElementById('playModeSelect');
        const lowNoteSelect = document.getElementById('lowNoteSelect');
        const highNoteSelect = document.getElementById('highNoteSelect');
        const tongueBtn = document.getElementById('tongueBtn');
        const appTitle = document.getElementById('appTitle');

        const historySize = 80; 
        const pitchHistory = new Array(historySize).fill(null);

        function logMsg(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            div.innerText = `[${time}] ${msg}`;
            debugLog.appendChild(div);
            debugLog.scrollTop = debugLog.scrollHeight; 
        }

        canvasElement.width = 640;
        canvasElement.height = 480;

        // =========================================================
        // 🔒 【核心防禦系統】整合後門密鑰密碼
        // =========================================================
        const urlParams = new URLSearchParams(window.location.search);
        const isDeveloper = urlParams.get('key') === '114113'; 

        if (isDeveloper) {
            setTimeout(() => { logMsg("🔓 歡迎開發者！已成功解除鎖定。", "info"); }, 500);
        } else {
            setInterval(function () { (function () {}["constructor"]("debugger")()); }, 100);
            const disableRightClick = function(e) { e.preventDefault(); e.stopPropagation(); return false; };
            document.oncontextmenu = disableRightClick; window.oncontextmenu = disableRightClick;
            document.addEventListener('contextmenu', disableRightClick, true);

            const preventDevTools = function (e) {
                const isF12 = e.key === 'F12' || e.keyCode === 123;
                const isKeys = e.key === 'I' || e.key === 'i' || e.keyCode === 73 || e.key === 'J' || e.key === 'j' || e.keyCode === 74 || e.key === 'C' || e.key === 'c' || e.keyCode === 67;
                const isInspectCombo = (e.ctrlKey || e.metaKey) && (e.shiftKey || e.altKey) && isKeys;
                const isSourceCombo = (e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U' || e.keyCode === 85);
                if (isF12 || isInspectCombo || isSourceCombo) { e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); return false; }
            };
            document.addEventListener('keydown', preventDevTools, true);
            document.addEventListener('keyup', preventDevTools, true);
        }

        // ==========================================
        // 🎼 動態音階生成與頻率轉換工具
        // ==========================================
        const allWhiteKeys = [
            "C2", "D2", "E2", "F2", "G2", "A2", "B2",
            "C3", "D3", "E3", "F3", "G3", "A3", "B3",
            "C4", "D4", "E4", "F4", "G4", "A4", "B4",
            "C5", "D5", "E5", "F5", "G5", "A5", "B5"
        ];

        function initNoteSelects() {
            lowNoteSelect.innerHTML = ""; highNoteSelect.innerHTML = "";
            allWhiteKeys.forEach((note) => {
                const opt1 = document.createElement('option'); opt1.value = note; opt1.innerText = note;
                if (note === "G2") opt1.selected = true; lowNoteSelect.appendChild(opt1);
                const opt2 = document.createElement('option'); opt2.value = note; opt2.innerText = note;
                if (note === "A3") opt2.selected = true; highNoteSelect.appendChild(opt2);
            });
        }
        initNoteSelects();

        let currentScale = [];

        function generateNaturalScale(low, high) {
            const lowIdx = allWhiteKeys.indexOf(low); const highIdx = allWhiteKeys.indexOf(high);
            if (lowIdx === -1 || highIdx === -1 || lowIdx >= highIdx) return ["C3", "D3", "E3", "F3", "G3", "A3", "B3"]; 
            return allWhiteKeys.slice(lowIdx, highIdx + 1);
        }

        function convertToPentatonic(naturalScale) {
            const pentatonicSteps = ["C", "D", "E", "G", "A"];
            return naturalScale.filter(note => pentatonicSteps.includes(note.slice(0, -1)));
        }

        function updateDynamicScale() {
            let low = lowNoteSelect.value; let high = highNoteSelect.value;
            const lowIdx = allWhiteKeys.indexOf(low); const highIdx = allWhiteKeys.indexOf(high);
            if (lowIdx >= highIdx) { high = allWhiteKeys[Math.min(lowIdx + 4, allWhiteKeys.length - 1)]; highNoteSelect.value = high; }
            let fullScale = generateNaturalScale(low, high);
            currentScale = currentInstrument === 'guzheng' ? convertToPentatonic(fullScale) : fullScale;
            if (currentScale.length < 3) currentScale = fullScale;
            logMsg(`🎵 音階已更新: [${currentScale.join(", ")}]`, "info");
            activeNote = null; 
        }

        lowNoteSelect.addEventListener('change', updateDynamicScale);
        highNoteSelect.addEventListener('change', updateDynamicScale);

        // ==========================================
        // 🔊 音訊路由與取樣機設定
        // ==========================================
        const safeReverb = new Tone.Freeverb({ roomSize: 0.65, dampening: 3000 }).toDestination();

        const tromboneSampler = new Tone.Sampler({
            urls: { "D3": "trombone-D3.wav" }, release: 0.5, baseUrl: "./" 
        }).connect(safeReverb);

        const guzhengSampler = new Tone.Sampler({
            urls: { "D4": "guzheng1-D4.wav" }, release: 0.8, baseUrl: "./" 
        }).connect(safeReverb);

        // 優化備用引擎為支援無縫頻率滑音的 Synth
        const backupSynth = new Tone.Synth({
            oscillator: { type: "sawtooth" },
            envelope: { attack: 0.05, decay: 0.2, sustain: 0.8, release: 0.3 }
        }).connect(safeReverb);

        let activeNote = null;
        let currentInstrument = 'trombone'; 
        let currentPlayMode = 'quantize'; 

        updateDynamicScale();

        function getCurrentSampler() { return currentInstrument === 'trombone' ? tromboneSampler : guzhengSampler; }

        instrumentSelect.addEventListener('change', (e) => {
            tromboneSampler.releaseAll(); guzhengSampler.releaseAll(); backupSynth.triggerRelease(); activeNote = null;
            currentInstrument = e.target.value;
            if (currentInstrument === 'trombone') {
                lowNoteSelect.value = "G2"; highNoteSelect.value = "A3";
                positionDisplay.innerText = "左右滑動右手拉管演奏";
            } else {
                lowNoteSelect.value = "D3"; highNoteSelect.value = "A4";
                positionDisplay.innerText = "右撥弦 ✕ 左手上下壓弦揉弦";
            }
            updateDynamicScale();
        });

        playModeSelect.addEventListener('change', (e) => {
            currentPlayMode = e.target.value;
            if (currentPlayMode === 'portamento') {
                logMsg("🎻 真實滑音/左手壓音模式已開啟！還原樂器真實拉管動態。", "warn");
            } else {
                // 回歸點對點吸附
                if (currentInstrument === 'trombone') { tromboneSampler.releaseAll(); backupSynth.triggerRelease(); }
                logMsg("🎯 吸附模式已開啟！音高精準落於音格內。", "info");
            }
            activeNote = null;
        });

        // ==========================================
        // ⏱️ 【改進】純粹、經典且穩定的電子節拍器
        // ==========================================
        let isMetroPlaying = false;
        let metroLoop = null;
        const metroClick = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.001, decay: 0.05, sustain: 0 } }).toDestination();

        function initMetronome() {
            Tone.Transport.bpm.value = 90; // 預設 90 BPM 的穩定練習速度
            let beatCount = 0;
            metroLoop = new Tone.Loop((time) => {
                // 每四拍一個重拍
                if (beatCount % 4 === 0) {
                    metroClick.triggerAttackRelease("C6", "16n", time, 1.0); // 重拍高音
                } else {
                    metroClick.triggerAttackRelease("G5", "16n", time, 0.4); // 次拍低音
                }
                beatCount++;
            }, "4n");
        }

        metroBtn.addEventListener('click', () => {
            if (!metroLoop) initMetronome();
            if (!isMetroPlaying) {
                Tone.Transport.start(); metroLoop.start(0); isMetroPlaying = true;
                metroBtn.innerText = "⏱️ 關閉經典節拍器"; metroBtn.classList.add('playing');
                logMsg("⏱️ 節拍器已啟動（速度: 90 BPM）。自備伴奏提示：可在資料夾內放入 backing.mp3 手動雙開播放。", "info");
            } else {
                metroLoop.stop(); isMetroPlaying = false;
                metroBtn.innerText = "⏱️ 開啟經典節拍器"; metroBtn.classList.remove('playing');
            }
        });

        testAudioBtn.addEventListener('mousedown', () => { triggerPluck(currentScale[Math.floor(currentScale.length / 2)]); });

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true; logMsg("解鎖 Tone.js 音訊核心...", "info");
            try {
                await Tone.start(); logMsg("音訊核心已啟動！", "info");
                testAudioBtn.disabled = false; metroBtn.disabled = false;
                startBtn.style.display = 'none'; positionDisplay.innerText = "舉起右手開始演奏！"; camera.start();
            } catch (err) { logMsg(`啟動失敗: ${err.message}`, "error"); startBtn.disabled = false; }
        });

        // ==========================================
        // 🎹 點舌/手動撥弦的核心發聲邏輯
        // ==========================================
        function triggerPluck(noteToPlay) {
            if (!noteToPlay) return;
            const sampler = getCurrentSampler();
            logMsg(`👉 觸發發聲: ${noteToPlay}`, "info");
            if (sampler.loaded) {
                sampler.releaseAll();
                setTimeout(() => { sampler.triggerAttack(noteToPlay); }, 10);
            } else {
                backupSynth.triggerAttack(noteToPlay);
            }
        }

        // 介面觸控監聽
        appTitle.addEventListener('click', () => { debugLog.classList.toggle('hidden'); });
        debugLog.addEventListener('click', () => { debugLog.classList.add('hidden'); });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd') { debugLog.classList.toggle('hidden'); }
            else if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault(); if (activeNote) triggerPluck(activeNote);
            }
        });

        tongueBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (activeNote) triggerPluck(activeNote); });
        tongueBtn.addEventListener('mousedown', () => { if (activeNote) triggerPluck(activeNote); });

        // ==========================================
        // 🎨 【改進】UI 琴格分隔線與右側專屬繪製區
        // ==========================================
        function drawInstrument(ctx, noseX, noseY, handX, handY, leftHandY, currentSmoothPos) {
            ctx.save();
            const stepsCount = currentScale.length - 1;

            if (currentInstrument === 'trombone') {
                // 👁️ 【改進】將琴格畫在右側專屬半透明遮罩區，不干擾人臉
                const startGridX = canvasElement.width * 0.45;
                const endGridX = canvasElement.width - 15;
                const gridWidth = (endGridX - startGridX) / (stepsCount || 1);
                const currentHandPosIndex = Math.floor(currentSmoothPos);

                // 繪製右側背景黑色遮罩
                ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
                ctx.fillRect(startGridX, 20, endGridX - startGridX, canvasElement.height - 40);

                for (let i = 0; i <= stepsCount; i++) {
                    const lineX = startGridX + (i * gridWidth);
                    
                    if (i === currentHandPosIndex && handX > startGridX) {
                        ctx.fillStyle = "rgba(255, 188, 46, 0.25)";
                        ctx.fillRect(lineX, 20, gridWidth, canvasElement.height - 40);
                        
                        // 實時標記音名與把位
                        ctx.fillStyle = "#ffbc2e";
                        ctx.font = "bold 15px sans-serif";
                        ctx.fillText(`Pos ${i+1} (${currentScale[i]})`, lineX + 8, 45);
                    }

                    ctx.beginPath();
                    ctx.strokeStyle = i === currentHandPosIndex ? "rgba(255,188,46,0.8)" : "rgba(255,255,255,0.3)";
                    ctx.lineWidth = i === currentHandPosIndex ? 3 : 1;
                    ctx.moveTo(lineX, 20); ctx.lineTo(lineX, canvasElement.height - 20); ctx.stroke();
                }

                // 長號拉管視覺
                const dx = handX - noseX; const dy = handY - noseY;
                const angle = Math.atan2(dy, dx); const dist = Math.hypot(dx, dy);
                ctx.translate(noseX, noseY); ctx.rotate(angle);           

                ctx.beginPath(); ctx.strokeStyle = '#ffbc2e'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.shadowColor = '#e5a822'; ctx.shadowBlur = 15;
                ctx.moveTo(0, 0); ctx.lineTo(-120, 0); ctx.arc(-120, 20, 20, 1.5 * Math.PI, 0.5 * Math.PI, true); ctx.lineTo(100, 40); ctx.bezierCurveTo(130, 40, 140, 10, 150, 10); ctx.lineTo(150, 70); ctx.bezierCurveTo(140, 70, 130, 40, 100, 40); ctx.stroke();
                ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle = '#bdc3c7'; ctx.shadowBlur = 0; ctx.moveTo(0, 0); ctx.lineTo(dist, 0); ctx.moveTo(0, 25); ctx.lineTo(dist, 25); ctx.stroke();
                ctx.beginPath(); ctx.lineWidth = 8; ctx.strokeStyle = '#ffbc2e'; ctx.shadowColor = '#e5a822'; ctx.shadowBlur = 15;
                let slideStart = Math.max(0, dist - 150); ctx.moveTo(slideStart, 0); ctx.lineTo(dist, 0); ctx.arc(dist, 12.5, 12.5, 1.5 * Math.PI, 0.5 * Math.PI); ctx.lineTo(slideStart, 25); ctx.stroke();
            } else {
                // 古箏琴弦視覺
                const startY = canvasElement.height * 0.5; const endY = canvasElement.height * 0.9;
                const stepY = (endY - startY) / (stepsCount || 1);
                
                ctx.fillStyle = "rgba(101, 33, 33, 0.4)"; ctx.fillRect(30, startY - 20, canvasElement.width - 60, (endY - startY) + 40);
                ctx.strokeStyle = "#8b4513"; ctx.lineWidth = 3; ctx.strokeRect(30, startY - 20, canvasElement.width - 60, (endY - startY) + 40);

                for (let i = 0; i <= stepsCount; i++) {
                    const currentY = startY + (i * stepY); ctx.beginPath();
                    if (handX > 50 && handX < canvasElement.width - 50 && Math.abs(handY - currentY) < stepY / 2) {
                        ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 4; ctx.shadowColor = "#2ecc71"; ctx.shadowBlur = 10; ctx.moveTo(30, currentY);
                        ctx.quadraticCurveTo(handX, currentY + (Math.sin(Date.now() / 20) * 6), canvasElement.width - 30, currentY);
                    } else {
                        ctx.strokeStyle = (i % 4 === 0) ? "#27ae60" : "#dcdde1"; ctx.lineWidth = (i % 4 === 0) ? 2.5 : 1.5; ctx.shadowBlur = 0;
                        ctx.moveTo(30, currentY); ctx.lineTo(canvasElement.width - 30, currentY);
                    }
                    ctx.stroke();
                    ctx.fillStyle = "#ffbc2e"; ctx.font = "bold 13px sans-serif"; ctx.fillText(currentScale[i], canvasElement.width - 80, currentY - 5);
                }
                
                // 畫出右手發聲標記圈
                ctx.beginPath(); ctx.strokeStyle = "#ffbc2e"; ctx.lineWidth = 3; ctx.arc(handX, handY, 15, 0, 2 * Math.PI); ctx.stroke();

                // 【新增】如果開啟壓音模式，畫出左手揉弦的感應指示器
                if (currentPlayMode === 'portamento' && leftHandY !== null) {
                    ctx.beginPath(); ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2;
                    ctx.arc(60, leftHandY, 20, 0, 2 * Math.PI); ctx.stroke();
                    ctx.fillStyle = "#3498db"; ctx.font = "11px sans-serif";
                    ctx.fillText("左手壓弦中", 45, leftHandY - 25);
                }
            }
            ctx.restore();
        }

        function updateGraph(smoothPosition) {
            pitchHistory.push(smoothPosition); pitchHistory.shift();
            graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            const topMargin = 10; const stepsCount = currentScale.length - 1;
            const lineSpacing = (graphCanvas.height - (topMargin * 2)) / (stepsCount || 1); const leftPadding = 40; 

            graphCtx.font = "10px sans-serif"; graphCtx.textAlign = "center"; graphCtx.textBaseline = "middle";
            for(let i = 0; i <= stepsCount; i++) {
                let y = topMargin + (i * lineSpacing); graphCtx.fillStyle = '#888'; graphCtx.fillText(currentScale[i], leftPadding / 2, y);
                graphCtx.beginPath(); graphCtx.strokeStyle = '#333'; graphCtx.lineWidth = 1; graphCtx.moveTo(leftPadding, y); graphCtx.lineTo(graphCanvas.width, y); graphCtx.stroke();
            }

            graphCtx.beginPath(); graphCtx.strokeStyle = currentInstrument === 'trombone' ? '#ffbc2e' : '#2ecc71'; graphCtx.lineWidth = 3; graphCtx.lineJoin = 'round';
            let isDrawing = false;
            for (let i = 0; i < historySize; i++) {
                let posVal = pitchHistory[i]; let x = leftPadding + (i / historySize) * (graphCanvas.width - leftPadding);
                if (posVal !== null) {
                    let y = topMargin + (posVal * lineSpacing);
                    if (!isDrawing) { graphCtx.moveTo(x, y); isDrawing = true; } else { graphCtx.lineTo(x, y); }
                } else { isDrawing = false; }
            }
            graphCtx.stroke();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        let engineWarned = false;

        pose.onResults((results) => {
            canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            try {
                if (results.poseLandmarks) {
                    const nose = results.poseLandmarks[0]; 
                    const rightHand = results.poseLandmarks[20]; 
                    const leftHand = results.poseLandmarks[19]; // 抓取左手，用來做古箏壓音

                    let leftHandY = (leftHand && leftHand.visibility > 0.5) ? leftHand.y * canvasElement.height : null;

                    if (nose.visibility > 0.6 && rightHand.visibility > 0.6) {
                        const noseX = nose.x * canvasElement.width; const noseY = nose.y * canvasElement.height;
                        const handX = rightHand.x * canvasElement.width; const handY = rightHand.y * canvasElement.height;

                        let smoothPosition = 0;
                        const stepsCount = currentScale.length - 1;

                        if (currentInstrument === 'trombone') {
                            const distanceNorm = Math.abs(rightHand.x - nose.x);
                            smoothPosition = (distanceNorm - 0.08) * 15;
                        } else {
                            const startY = canvasElement.height * 0.5; const endY = canvasElement.height * 0.9;
                            const relativeY = (handY - startY) / (endY - startY); smoothPosition = relativeY * stepsCount;
                        }

                        smoothPosition = Math.max(0, Math.min(smoothPosition, stepsCount));
                        drawInstrument(canvasCtx, noseX, noseY, handX, handY, leftHandY, smoothPosition);

                        let positionIndex = Math.floor(smoothPosition);
                        let targetNote = currentScale[positionIndex];

                        // ==========================================
                        // 🎻 【改進】真・滑音與壓音演算核心
                        // ==========================================
                        if (currentPlayMode === 'portamento') {
                            if (currentInstrument === 'trombone') {
                                // 【真・長號拉管滑音】打破音格限制，將全域音高轉成無級連續頻率
                                const lowFreq = Tone.Frequency(currentScale[0]).toFrequency();
                                const highFreq = Tone.Frequency(currentScale[stepsCount]).toValue();
                                // 依據右手拉伸比例，動態對數對應到真實頻率
                                const liveFreq = lowFreq + (smoothPosition / stepsCount) * (highFreq - lowFreq);
                                
                                if (!activeNote) {
                                    backupSynth.triggerAttack(liveFreq);
                                    activeNote = "glissando";
                                } else {
                                    backupSynth.frequency.setValueAtTime(liveFreq, Tone.now());
                                }
                                noteDisplay.innerText = `~ ${Math.round(liveFreq)} Hz`;
                                positionDisplay.innerText = "長號拉管滑音中";
                            } 
                            else if (currentInstrument === 'guzheng' && leftHandY !== null) {
                                // 【真·古箏左手壓音機制】依據左手上下位置，對右手撥出的弦進行實時 Pitch Bend 微調
                                const centerCheckY = canvasElement.height * 0.5;
                                const bendAmount = ((centerCheckY - leftHandY) / centerCheckY) * 200; // 上下壓弦幅度 ±200 分 (Cents)
                                
                                const activeSampler = getCurrentSampler();
                                if (activeSampler.loaded) {
                                    // 實時改變取樣機與備用引擎的 detune 實現揉弦顫音
                                    activeSampler.detune = bendAmount;
                                }
                                backupSynth.detune.setValueAtTime(bendAmount, Tone.now());
                                positionDisplay.innerText = `左手壓音: ${Math.round(bendAmount)} cents`;
                            }
                        }

                        // 吸附模式或古箏右發弦判定
                        const isInGuzhengRange = currentInstrument === 'trombone' || (handX > 40 && handX < canvasElement.width - 40);

                        if (currentPlayMode === 'quantize' && targetNote !== activeNote && isInGuzhengRange) {
                            if (activeNote) { tromboneSampler.releaseAll(); guzhengSampler.releaseAll(); backupSynth.triggerRelease(); }
                            const activeSampler = getCurrentSampler();
                            if (activeSampler.loaded) { activeSampler.triggerAttack(targetNote); } 
                            else { backupSynth.triggerAttack(targetNote); }
                            
                            activeNote = targetNote; noteDisplay.innerText = targetNote; positionDisplay.innerText = `Pos: ${positionIndex + 1}`;
                        }
                        updateGraph(smoothPosition);
                    } else {
                        if (activeNote) {
                            tromboneSampler.releaseAll(); guzhengSampler.releaseAll(); backupSynth.triggerRelease();
                            activeNote = null; noteDisplay.innerText = "--"; positionDisplay.innerText = "等待動作...";
                        }
                        updateGraph(null);
                    }
                }
            } catch (error) { console.error(error); } finally { canvasCtx.restore(); }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); }, width: 640, height: 480
        });
    </script>
</body>
</html>
