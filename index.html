<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Trombone Studio (Responsive & Landscape Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        /* 基礎全螢幕設定 */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1a1a1a; 
            color: #eee; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden; /* 防止橫向時出現多餘滾動條 */
        }

        /* 主容器：電腦預設左右排版 */
        .app-container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            background: #2b2b2b; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 1024px;
            width: 100%;
            height: auto;
            max-height: 95vh;
            box-sizing: border-box;
        }

        .side-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 300px; 
            flex-shrink: 0; 
            justify-content: center;
        }

        h1 { margin: 0; font-size: 22px; color: #ffbc2e; text-align: center; }
        
        button { padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; background-color: #ffbc2e; border: none; border-radius: 6px; color: #111; transition: 0.2s; }
        button:hover { background-color: #e5a822; }
        button:disabled { background-color: #666; color: #aaa; cursor: not-allowed; }
        
        .test-btn { background-color: #3498db; color: #fff; padding: 8px; font-size: 13px; margin-top: -5px; }
        .test-btn:hover { background-color: #2980b9; }

        .status-box { background: #1e1e1e; padding: 8px; border-radius: 6px; border: 1px solid #444; text-align: center; }
        #noteDisplay { font-size: 28px; font-weight: bold; color: #ffbc2e; margin-top: 3px; }
        #positionDisplay { font-size: 13px; color: #888; }

        #graph_canvas { background: #1e1e1e; border: 1px solid #444; border-radius: 6px; width: 100%; height: 120px; }
        
        .debug-panel { background: #000; border: 1px solid #333; border-radius: 6px; padding: 8px; height: 80px; overflow-y: auto; font-family: monospace; font-size: 11px; }
        .log-info { color: #2ecc71; margin-bottom: 4px; }
        .log-warn { color: #f1c40f; margin-bottom: 4px; }
        .log-error { color: #e74c3c; margin-bottom: 4px; font-weight: bold; }

        /* 視訊容器 */
        #canvas-container { 
            position: relative; 
            flex-grow: 1;
            width: 100%;
            max-width: 640px; 
            aspect-ratio: 4 / 3; 
            border: 2px solid #111; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
        }

        video, #output_canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            transform: scaleX(-1); 
            object-fit: cover; 
        }

        /* ==========================================
           📱 【手機直向模式】 (寬度小且高大於寬)
           ========================================== */
        @media (max-width: 850px) and (orientation: portrait) {
            body {
                align-items: flex-start;
                overflow-y: auto; /* 直向允許上下滑動 */
            }
            .app-container { 
                flex-direction: column-reverse; /* 視訊在上面，控制台在下面 */
                padding: 12px;
                gap: 12px;
                max-height: none;
            }
            .side-panel { 
                width: 100%; 
            }
            #canvas-container {
                max-width: 100%; 
            }
        }

        /* ==========================================
           📱 【手機橫向特別優化】 (寬大於高，且高度較矮)
           ========================================== */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 5px;
                overflow: hidden; /* 確保不出現滾動條 */
            }
            .app-container {
                flex-direction: row; /* 保持左右並排 */
                padding: 10px;
                gap: 15px;
                height: 96vh; /* 高度剛好撐滿螢幕 */
                border-radius: 8px;
            }
            .side-panel {
                width: 220px; /* 橫向時窄化左邊控制台 */
                gap: 5px;
            }
            h1 { font-size: 16px; }
            button { padding: 8px; font-size: 13px; }
            .test-btn { padding: 5px; font-size: 11px; }
            .status-box { padding: 4px; }
            #noteDisplay { font-size: 22px; }
            #positionDisplay { font-size: 11px; }
            #graph_canvas { height: 75px; } /* 縮小折線圖，完美塞進窄螢幕 */
            .debug-panel { height: 50px; font-size: 10px; }
            
            #canvas-container {
                max-height: 100%; /* 視訊高度不超出容器 */
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="side-panel">
            <h1>🎺 Air Trombone</h1>
            <button id="startBtn">啟動系統 (Start)</button>
            <button id="testAudioBtn" class="test-btn" disabled>🔊 強制測試發聲</button>
            
            <div class="status-box">
                <div id="noteDisplay">--</div>
                <div id="positionDisplay">等待啟動...</div>
            </div>

            <canvas id="graph_canvas" width="320" height="150"></canvas>

            <div class="debug-panel" id="debugLog">
                <div class="log-info" style="color: #888;">[System] 雙向響應系統已就緒。</div>
            </div>
        </div>

        <div id="canvas-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const graphCanvas = document.getElementById('graph_canvas');
        const graphCtx = graphCanvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const testAudioBtn = document.getElementById('testAudioBtn');
        const noteDisplay = document.getElementById('noteDisplay');
        const positionDisplay = document.getElementById('positionDisplay');
        const debugLog = document.getElementById('debugLog');

        function logMsg(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            div.innerText = `[${time}] ${msg}`;
            debugLog.appendChild(div);
            debugLog.scrollTop = debugLog.scrollHeight; 
            console.log(`[${type.toUpperCase()}] ${msg}`);
        }

        canvasElement.width = 640;
        canvasElement.height = 480;

        // ==========================================
        // 🔊 音訊路由設計 (使用安全 Freeverb)
        // ==========================================
        const safeReverb = new Tone.Freeverb({ roomSize: 0.6, dampening: 3000 }).toDestination();

        const sampler = new Tone.Sampler({
            urls: { "D3": "trombone-D3.wav" }, 
            release: 0.5,
            baseUrl: "./" 
        }).connect(safeReverb);

        const backupSynth = new Tone.FMSynth({
            harmonicity: 1.5,
            modulationIndex: 2,
            oscillator: { type: "sawtooth" },
            envelope: { attack: 0.05, decay: 0.3, sustain: 0.8, release: 0.4 },
            modulation: { type: "triangle" },
            modulationEnvelope: { attack: 0.1, decay: 0.2, sustain: 1, release: 0.4 }
        }).toDestination();

        let activeNote = null;
        const trombonePositions = ["G2", "A2", "B2", "C3", "D3", "E3", "F3", "G3", "A3"];
        const historySize = 80; 
        const pitchHistory = new Array(historySize).fill(null);

        // === 測試發聲按鈕邏輯 ===
        testAudioBtn.addEventListener('mousedown', () => {
            logMsg("測試長號取樣音色...", "info");
            if (sampler.loaded) {
                sampler.triggerAttack("C3");
            } else {
                backupSynth.triggerAttack("C3");
            }
        });
        testAudioBtn.addEventListener('mouseup', () => {
            sampler.releaseAll();
            backupSynth.triggerRelease();
        });
        testAudioBtn.addEventListener('mouseleave', () => {
            sampler.releaseAll();
            backupSynth.triggerRelease();
        });

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            logMsg("解鎖 Tone.js 音訊核心...", "info");
            
            try {
                await Tone.start();
                logMsg("音訊核心已啟動，主輸出通道開啟！", "info");
                
                testAudioBtn.disabled = false;
                logMsg("👉 請點擊上方 [🔊 強制測試發聲] 確認音色！", "warn");
                
                startBtn.style.display = 'none';
                positionDisplay.innerText = "舉起右手開始演奏！";
                camera.start();

            } catch (err) {
                logMsg(`啟動失敗: ${err.message}`, "error");
                startBtn.innerText = "啟動失敗";
                startBtn.disabled = false;
            }
        });

        function drawTrombone(ctx, noseX, noseY, handX, handY) {
            const dx = handX - noseX; const dy = handY - noseY;
            const angle = Math.atan2(dy, dx); const dist = Math.hypot(dx, dy);
            ctx.save(); ctx.translate(noseX, noseY); ctx.rotate(angle);           

            ctx.beginPath(); ctx.strokeStyle = '#ffbc2e'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.shadowColor = '#e5a822'; ctx.shadowBlur = 15;
            ctx.moveTo(0, 0); ctx.lineTo(-120, 0); ctx.arc(-120, 20, 20, 1.5 * Math.PI, 0.5 * Math.PI, true); ctx.lineTo(100, 40); ctx.bezierCurveTo(130, 40, 140, 10, 150, 10); ctx.lineTo(150, 70); ctx.bezierCurveTo(140, 70, 130, 40, 100, 40); ctx.stroke();
            
            ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle = '#bdc3c7'; ctx.shadowBlur = 0;
            ctx.moveTo(0, 0); ctx.lineTo(dist, 0); ctx.moveTo(0, 25); ctx.lineTo(dist, 25); ctx.stroke();
            
            ctx.beginPath(); ctx.lineWidth = 8; ctx.strokeStyle = '#ffbc2e'; ctx.shadowColor = '#e5a822'; ctx.shadowBlur = 15;
            let slideStart = Math.max(0, dist - 150); 
            ctx.moveTo(slideStart, 0); ctx.lineTo(dist, 0); ctx.arc(dist, 12.5, 12.5, 1.5 * Math.PI, 0.5 * Math.PI); ctx.lineTo(slideStart, 25); ctx.stroke();
            
            ctx.beginPath(); ctx.lineWidth = 5; ctx.moveTo(dist - 30, 0); ctx.lineTo(dist - 30, 25); ctx.stroke();
            ctx.restore();
        }

        function updateGraph(smoothPosition) {
            pitchHistory.push(smoothPosition); pitchHistory.shift();
            graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            
            // 根據 canvas 當前實際高度來動態調整線距，確保橫向縮小時不穿幫
            const topMargin = 10;
            const lineSpacing = (graphCanvas.height - (topMargin * 2)) / 8; 
            const leftPadding = 40; 

            graphCtx.font = "10px sans-serif"; graphCtx.textAlign = "center"; graphCtx.textBaseline = "middle";
            for(let i = 0; i <= 8; i++) {
                let y = topMargin + (i * lineSpacing);
                graphCtx.fillStyle = '#888'; graphCtx.fillText(trombonePositions[i], leftPadding / 2, y);
                graphCtx.beginPath(); graphCtx.strokeStyle = '#333'; graphCtx.lineWidth = 1; graphCtx.moveTo(leftPadding, y); graphCtx.lineTo(graphCanvas.width, y); graphCtx.stroke();
            }

            graphCtx.beginPath(); graphCtx.strokeStyle = '#ffbc2e'; graphCtx.lineWidth = 3; graphCtx.lineJoin = 'round';
            let isDrawing = false;
            for (let i = 0; i < historySize; i++) {
                let posVal = pitchHistory[i];
                let x = leftPadding + (i / historySize) * (graphCanvas.width - leftPadding);
                if (posVal !== null) {
                    let y = topMargin + (posVal * lineSpacing);
                    if (!isDrawing) { graphCtx.moveTo(x, y); isDrawing = true; } 
                    else { graphCtx.lineTo(x, y); }
                } else { isDrawing = false; }
            }
            graphCtx.stroke();
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        let engineWarned = false;

        pose.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            try {
                if (results.poseLandmarks) {
                    const nose = results.poseLandmarks[0];
                    const rightHand = results.poseLandmarks[20]; 

                    if (nose.visibility > 0.6 && rightHand.visibility > 0.6) {
                        const noseX = nose.x * canvasElement.width; const noseY = nose.y * canvasElement.height;
                        const handX = rightHand.x * canvasElement.width; const handY = rightHand.y * canvasElement.height;

                        drawTrombone(canvasCtx, noseX, noseY, handX, handY);

                        const distanceNorm = Math.abs(rightHand.x - nose.x);
                        let smoothPosition = (distanceNorm - 0.08) * 15;
                        smoothPosition = Math.max(0, Math.min(smoothPosition, 8));

                        let positionIndex = Math.floor(smoothPosition);
                        const targetNote = trombonePositions[positionIndex];

                        if (targetNote !== activeNote) {
                            if (activeNote) {
                                sampler.triggerRelease(activeNote);
                                backupSynth.triggerRelease();
                            }
                            
                            if (sampler.loaded) {
                                sampler.triggerAttack(targetNote);
                                if (engineWarned) {
                                    logMsg("✅ 取樣機已恢復正常運作", "info");
                                    engineWarned = false; 
                                }
                            } else {
                                backupSynth.triggerAttack(targetNote);
                                if (!engineWarned) {
                                    logMsg("⚠️ 正在載入長號取樣音檔...", "warn");
                                    engineWarned = true; 
                                }
                            }
                            
                            activeNote = targetNote;
                            noteDisplay.innerText = targetNote;
                            positionDisplay.innerText = `Pos: ${positionIndex + 1}`;
                        }
                        updateGraph(smoothPosition);
                    } else {
                        if (activeNote) {
                            if (sampler.loaded) sampler.releaseAll();
                            backupSynth.triggerRelease();
                            activeNote = null;
                            noteDisplay.innerText = "--";
                            positionDisplay.innerText = "等待動作...";
                        }
                        updateGraph(null);
                    }
                }
            } catch (error) {
                logMsg(`執行錯誤: ${error.message}`, "error");
            } finally {
                canvasCtx.restore();
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await pose.send({image: videoElement}); },
            width: 640, height: 480
        });
    </script>
</body>
</html>
